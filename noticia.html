<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Notícia</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>Jornal M.O News</header>
<nav>
  <a href="index.html">Início</a>
</nav>

<div class="container">

  <h1 id="titulo"></h1>
  <p id="data"></p>
  <img id="imagem" style="width:100%">
  <p id="conteudo"></p>

</div>

<script>
  const p = new URLSearchParams(window.location.search);
  titulo.innerText = p.get("titulo");
  imagem.src = p.get("imagem");
  conteudo.innerText = p.get("conteudo");
  data.innerText = p.get("data");
</script>

</body>
</html>
